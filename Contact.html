<!--- ═══════════════════════════════════════════════════
  CART PANEL — paste this block into every HTML page
  Place it right after the closing </nav> tag and
  before <main>
═══════════════════════════════════════════════════ --->

<!--- Cart Overlay — darkens the page behind the cart --->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!--- Cart Side Panel --->
<div class="cart-panel" id="cartPanel">

  <!--- Cart Header --->
  <div class="cart-panel__header">
    <h2 class="cart-panel__title">Your Bag</h2>
    <button class="cart-panel__close" onclick="closeCart()" aria-label="Close cart">✕</button>
  </div>

  <!--- Cart Items — filled dynamically by JavaScript --->
  <div class="cart-panel__items" id="cartItems">
    <p class="cart-empty">Your bag is empty.</p>
  </div>

  <!--- Cart Footer — Total and Checkout --->
  <div class="cart-panel__footer">
    <div class="cart-panel__total-row">
      <span class="cart-panel__total-label">Total</span>
      <span class="cart-panel__total-value" id="cartTotal">$0</span>
    </div>
    <button class="cart-panel__checkout">Checkout</button>
  </div>

</div>

<!--- Toast Notification — appears briefly when item is added --->
<div class="added-toast" id="addedToast"></div>

  <!-- CONTACT INFORMATION (unique to this page) -->
  <main>
    <section class="page-hero">
      <h1>Contact Us</h1>
    </section>

    <!-- Contact form container and details -->
    <div class="form-container">

      <!--- Contact Form — submissions go to Formspree --->
      <form id="contactForm" class="contact-form" action="https://formspree.io/f/mzdyygaw" method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" placeholder="Type your message here..." required></textarea>

        <button type="submit">Send</button>
      </form>

    </div>
  </main>

  <footer class="site-footer">Created by Noah C. Jones</footer>

  <!-- same JS file, works on every page -->
  <script src="js/main.js"></script>
</body>
</html>
